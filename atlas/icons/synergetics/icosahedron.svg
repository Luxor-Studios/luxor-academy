<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Icosahedron — Master/boss glyph (12 vertices, 20 faces)">
  <title>Icosahedron</title>
  <desc>Twelve vertices, thirty edges, twenty triangular faces. The Master-tier glyph — appears at quest boss-fights.</desc>
  <g fill="none" stroke="#E9B949" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer pentagonal silhouette (icosahedron projects as a regular decagon along a 5-fold axis; we use a pentagonal silhouette pair) -->
    <polygon points="50,8 89,36 74,82 26,82 11,36"/>
    <!-- Inner pentagon rotated 36° -->
    <polygon points="50,38 71,50 64,72 36,72 29,50"/>
    <!-- Spokes connecting outer to inner pentagon -->
    <line x1="50" y1="8" x2="50" y2="38"/>
    <line x1="89" y1="36" x2="71" y2="50"/>
    <line x1="74" y1="82" x2="64" y2="72"/>
    <line x1="26" y1="82" x2="36" y2="72"/>
    <line x1="11" y1="36" x2="29" y2="50"/>
    <!-- Cross-pentagon edges (some of the 30 — symbolic) -->
    <line x1="50" y1="8" x2="71" y2="50"/>
    <line x1="50" y1="8" x2="29" y2="50"/>
    <line x1="89" y1="36" x2="64" y2="72"/>
    <line x1="11" y1="36" x2="36" y2="72"/>
    <line x1="74" y1="82" x2="36" y2="72"/>
    <line x1="26" y1="82" x2="64" y2="72"/>
    <!-- Vertex dots -->
    <circle cx="50" cy="8" r="1.4" fill="#E9B949"/>
    <circle cx="89" cy="36" r="1.4" fill="#E9B949"/>
    <circle cx="74" cy="82" r="1.4" fill="#E9B949"/>
    <circle cx="26" cy="82" r="1.4" fill="#E9B949"/>
    <circle cx="11" cy="36" r="1.4" fill="#E9B949"/>
    <circle cx="50" cy="38" r="1.4" fill="#E9B949"/>
    <circle cx="71" cy="50" r="1.4" fill="#E9B949"/>
    <circle cx="64" cy="72" r="1.4" fill="#E9B949"/>
    <circle cx="36" cy="72" r="1.4" fill="#E9B949"/>
    <circle cx="29" cy="50" r="1.4" fill="#E9B949"/>
  </g>
</svg>
