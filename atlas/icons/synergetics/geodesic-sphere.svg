<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Geodesic sphere — Atlas / global glyph">
  <title>Geodesic Sphere</title>
  <desc>A frequency-2 geodesic subdivision projected to a circular silhouette. Atlas-tier glyph; signifies the whole.</desc>
  <g fill="none" stroke="#E9B949" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer circle -->
    <circle cx="50" cy="50" r="42"/>
    <!-- Equator ellipse (3D suggestion) -->
    <ellipse cx="50" cy="50" rx="42" ry="14" opacity="0.85"/>
    <!-- Meridian ellipses -->
    <ellipse cx="50" cy="50" rx="14" ry="42" opacity="0.85"/>
    <ellipse cx="50" cy="50" rx="28" ry="42" opacity="0.55"/>
    <!-- Geodesic struts: hexagonal-pentagonal star (frequency-2 face suggestion) -->
    <polygon points="50,8 78,28 68,62 32,62 22,28" opacity="0.85"/>
    <polygon points="50,92 22,72 32,38 68,38 78,72" opacity="0.85"/>
    <!-- North/south poles + equator markers -->
    <circle cx="50" cy="8" r="1.4" fill="#E9B949"/>
    <circle cx="50" cy="92" r="1.4" fill="#E9B949"/>
    <circle cx="8" cy="50" r="1.4" fill="#E9B949"/>
    <circle cx="92" cy="50" r="1.4" fill="#E9B949"/>
  </g>
</svg>
