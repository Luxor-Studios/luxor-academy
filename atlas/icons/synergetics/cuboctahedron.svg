<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Cuboctahedron / Vector Equilibrium — Track glyph (12 vertices)">
  <title>Cuboctahedron — Vector Equilibrium</title>
  <desc>Buckminster Fuller's vector equilibrium: twelve vertices equidistant from a thirteenth center, eight triangular and six square faces. Track-tier glyph and the ground state of the jitterbug transformation.</desc>
  <g fill="none" stroke="#E9B949" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer hexagonal silhouette (a cuboctahedron projects as a regular hexagon when viewed along a 3-fold axis) -->
    <polygon points="50,8 86,29 86,71 50,92 14,71 14,29"/>
    <!-- Inner triangle (top three vertices forming the triangular face nearest viewer) -->
    <polygon points="50,32 68,50 32,50"/>
    <!-- Lower inverted triangle -->
    <polygon points="50,68 32,50 68,50"/>
    <!-- Spokes from each outer vertex to nearest inner vertex -->
    <line x1="50" y1="8" x2="50" y2="32"/>
    <line x1="86" y1="29" x2="68" y2="50"/>
    <line x1="86" y1="71" x2="68" y2="50"/>
    <line x1="50" y1="92" x2="50" y2="68"/>
    <line x1="14" y1="71" x2="32" y2="50"/>
    <line x1="14" y1="29" x2="32" y2="50"/>
    <!-- Vertex dots (12 outer, 0 center — center is implied) -->
    <circle cx="50" cy="8" r="1.4" fill="#E9B949"/>
    <circle cx="86" cy="29" r="1.4" fill="#E9B949"/>
    <circle cx="86" cy="71" r="1.4" fill="#E9B949"/>
    <circle cx="50" cy="92" r="1.4" fill="#E9B949"/>
    <circle cx="14" cy="71" r="1.4" fill="#E9B949"/>
    <circle cx="14" cy="29" r="1.4" fill="#E9B949"/>
    <circle cx="50" cy="32" r="1.4" fill="#E9B949"/>
    <circle cx="68" cy="50" r="1.4" fill="#E9B949"/>
    <circle cx="32" cy="50" r="1.4" fill="#E9B949"/>
    <circle cx="50" cy="68" r="1.4" fill="#E9B949"/>
  </g>
</svg>
