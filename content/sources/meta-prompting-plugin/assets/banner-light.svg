<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="meta-prompting-plugin">
  <defs>
    <linearGradient id="gL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <style>
      .mono { font-family: "JetBrains Mono","SF Mono",ui-monospace,monospace; fill:#1e293b; }
      .op   { font-family: "JetBrains Mono","SF Mono",ui-monospace,monospace; fill:#94a3b8; }
      .wordmark { font-family:"Inter",ui-sans-serif,system-ui,sans-serif; font-weight:700; fill:#0f172a; }
      .tag  { font-family:"Inter",ui-sans-serif,system-ui,sans-serif; font-weight:400; fill:#64748b; }
      .accent { fill:url(#gL); }
    </style>
  </defs>

  <!-- subtle frame -->
  <rect x="20" y="20" width="760" height="180" rx="14" ry="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- floating operators -->
  <text x="60"  y="62"  class="op" font-size="14">→</text>
  <text x="720" y="62"  class="op" font-size="14">⊗</text>
  <text x="60"  y="190" class="op" font-size="14">||</text>
  <text x="720" y="190" class="op" font-size="14">&gt;=&gt;</text>

  <!-- wordmark -->
  <text x="400" y="100" text-anchor="middle" class="wordmark" font-size="42">meta-prompting<tspan class="accent">-plugin</tspan></text>

  <!-- operators row -->
  <text x="400" y="140" text-anchor="middle" class="mono" font-size="22" letter-spacing="8">→   ||   ⊗   &gt;=&gt;</text>

  <!-- tagline -->
  <text x="400" y="175" text-anchor="middle" class="tag" font-size="14">compositional prompt engineering · inspired by category theory</text>
</svg>
